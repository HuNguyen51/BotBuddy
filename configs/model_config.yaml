# ============================================================
# Model Configuration — Không hardcode bất kỳ thứ gì vào code
# ============================================================

# --- LLM ---
llm:
  model: "ollama/gpt-oss:120b-cloud" # LiteLLM model string
  temperature: 0.1
  max_tokens: 128000

# --- Agent ---
agent:
  max_iterations: 10                # Max ReAct loop iterations
  recursion_limit: 20               # LangGraph recursion limit

# --- Vector Store ---
vector_store:
  collection_name: "fnb_collection"
  persist_directory: "./external_data_storage/qdrant_db"
  vector_size: 1024
  distance: "Dot"

# --- Embedding ---
embedding:
  model_name: "AITeamVN/Vietnamese_Embedding"
  dimensions: 1024

# --- Logging ---
logging:
  level: "INFO"                     # DEBUG | INFO | WARNING | ERROR
  json_output: true                 # structlog JSON format
